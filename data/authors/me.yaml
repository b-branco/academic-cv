bio: "I'm a PhD researcher investigating the use of machine learning in large datasets to address depression heterogeneity across the life course. My project is part of the UKRI AI CDT for Biomedical Innovation programme.\n\n
  I have a background in engineering, with a BEng degree in Electronics Engineering from Durham University and an MSc in Human and Biological Robotics from Imperial College London. For my Master's thesis, I developed a phone app to monitor and support children and young people's mental health during the COVID-19 lockdowns.\n\n
  Before starting my PhD, I worked in technical communications for software products, first as a Technical Writer at Microsoft, then as a Documentation Engineer at Imagination Technologies.\n\n
  Outside of work and studies, I enjoy playing videogames, writing, and taking my very spoiled dog on nature walks."
